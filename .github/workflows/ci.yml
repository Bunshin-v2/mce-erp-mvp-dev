name: MCE Enterprise CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 18
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
        
    - name: Install Dependencies
      run: npm ci --legacy-peer-deps
      
    - name: Type Check (Strict)
      run: npx tsc --noEmit
      
    - name: Linting
      run: npm run lint
      
    - name: Quantus-Proxy Security Scan
      run: npx ts-node scripts/quantus-proxy.ts
      
    - name: Build Verification
      run: npm run build
