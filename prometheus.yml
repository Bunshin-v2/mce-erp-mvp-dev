global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'nexus-construct-erp'
    environment: 'development'

scrape_configs:
  - job_name: 'nexus-erp-app'
    metrics_path: '/api/metrics'
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: 'nexus-construct-erp'
          app: 'frontend'

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
